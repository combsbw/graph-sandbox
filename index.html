<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GraphSand">
<meta name="theme-color" content="#0c0e16">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Graph Sandbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,600;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans','SF Pro Display','Helvetica Neue',system-ui,sans-serif;background:#0c0e16;color:#e0e0ea;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#root{min-height:100vh;min-height:100dvh}
.math{font-family:'STIX Two Text','Cambria Math','Times New Roman',Georgia,serif}
.mono{font-family:'JetBrains Mono','SF Mono','Menlo','Consolas',monospace}

@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes ghostFadeOut{0%{opacity:.6}100%{opacity:0}}
@keyframes drawLine{0%{stroke-dashoffset:2000}100%{stroke-dashoffset:0}}
@keyframes tutPulse{0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,.72),0 0 0 3px #f0c86855}50%{box-shadow:0 0 0 9999px rgba(0,0,0,.72),0 0 0 8px #f0c868aa}}

.safe-top{padding-top:env(safe-area-inset-top,0)}
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,0)}
button{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#252538;border-radius:2px}

/* ── Slider ── */
.param-slider{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  border-radius:3px;outline:none;
  background:#1a1c28;
}
.param-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:28px;height:28px;border-radius:50%;
  cursor:pointer;border:3px solid var(--tc,#6eb4e6);
  background:#12141e;box-shadow:0 0 10px var(--tc,#6eb4e6)30;
  transition:transform .15s;
}
.param-slider::-webkit-slider-thumb:active{transform:scale(1.2)}

/* ── Toggle chips ── */
.toggle-chip{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid #2a2a40;background:#12141e;
  color:#666;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.toggle-chip.active{
  border-color:var(--tc,#6eb4e6)55;
  color:var(--tc,#6eb4e6);
  background:var(--tc,#6eb4e6)10;
}

/* ── Function machine ── */
.machine-box{
  border:2px solid #2a2c40;border-radius:16px;
  background:#10121c;padding:16px 20px;
  position:relative;overflow:hidden;
}
.machine-arrow{
  color:#3a3c55;font-size:22px;display:flex;align-items:center;
}

/* ── Responsive landscape layout ── */
.app-layout{display:flex;flex-direction:column}
.graph-col{flex:1;min-width:0}
.controls-col{flex:1;min-width:0}

@media (min-aspect-ratio:1/1) and (min-width:640px){
  .app-layout{flex-direction:row;gap:16px;align-items:start}
  .graph-col{flex:1.3;position:sticky;top:0}
  .controls-col{flex:1;max-height:100vh;overflow-y:auto;padding-bottom:40px}
  .controls-col::-webkit-scrollbar{width:3px}
  .controls-col::-webkit-scrollbar-thumb{background:#252538;border-radius:2px}
}

@media (orientation:landscape) and (max-height:500px){
  .compact-header{padding:8px 16px 6px !important}
  .compact-header h1{font-size:18px !important}
  .compact-header p{display:none}
}
.tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.tutorial-card{background:#12141e;border-radius:20px;padding:28px 30px;max-width:420px;width:100%;border:1px solid #2a2c40;animation:slideIn .3s ease}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

// ═══════════════════════════════
//  Constants & Helpers
// ═══════════════════════════════
const M='\u2212',SUP='⁰¹²³⁴⁵⁶⁷⁸⁹';
const sup=n=>`${n}`.split('').map(c=>c==='-'?'\u207b':SUP[+c]||c).join('');
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const round2=v=>Math.round(v*100)/100;
const nice=v=>{const r=round2(v);return r===Math.floor(r)?`${r}`:r.toFixed(2).replace(/0$/,'')};

const COLORS={
  m:'#e88c6c',   // slope/coefficient — warm orange
  b:'#6eb4e6',   // y-intercept — blue
  n:'#b088e0',   // exponent — purple
  h:'#6ecaa0',   // horizontal shift — green
  curve:'#f0c868',  // the curve itself
  curveShadow:'#f0c86830',
  grid:'#1a1c28',
  axis:'#2a2c40',
  bg:'#0c0e16',
};

// ═══════════════════════════════
//  Equation Renderer
// ═══════════════════════════════
function EquationDisplay({m,b,n,h,useFx,probeX,probeY,showProbe}){
  const sz=39;

  // Build the live equation as React nodes
  const mAbs=Math.abs(m);
  const bAbs=Math.abs(b);
  const hAbs=Math.abs(h);

  const mColor=COLORS.m, bColor=COLORS.b, nColor=COLORS.n, hColor=COLORS.h;

  // Coefficient part
  const mShow = mAbs===1&&n===1 ? '' : mAbs===1 ? '' : nice(mAbs);
  const mSign = m<0 ? M : '';

  // x part with shift
  let xPart=null;
  if(n===0){
    xPart=null; // constant
  } else {
    const inner=h===0 ? <i>x</i> :
      <span>(<i>x</i>{h>0?<span style={{color:hColor}}> {M} {nice(hAbs)}</span>:<span style={{color:hColor}}> + {nice(hAbs)}</span>})</span>;

    if(n===1){
      xPart=inner;
    } else {
      xPart=<span>{h!==0||n>1?<span>{inner}</span>:inner}<sup style={{fontSize:'.6em',color:nColor,position:'relative',top:'-.4em'}}>{n}</sup></span>;
    }
  }

  // b part
  const bPart=b===0?null:(
    <span style={{color:bColor}}>
      {b>0?' + ':` ${M} `}{nice(bAbs)}
    </span>
  );

  return (
    <div style={{textAlign:'center',padding:'12px 0'}}>
      {/* Main equation */}
      <div className="math" style={{fontSize:sz,fontWeight:700,color:'#eaeaf2',lineHeight:1.4}}>
        <span style={{color:'#888'}}>{useFx?<><i>f</i>(<i>x</i>)</>:'y'}</span>
        <span style={{color:'#3a3c55'}}> = </span>
        {m===0&&b===0?<span>0</span>:
         m===0?<span style={{color:bColor}}>{nice(b)}</span>:
        <>
          {mSign&&<span style={{color:mColor}}>{mSign}</span>}
          {mShow&&<span style={{color:mColor}}>{mShow}</span>}
          {xPart}
          {bPart}
        </>}
      </div>

      {/* Probe readout */}
      {showProbe&&probeX!=null&&(
        <div className="mono" style={{fontSize:13,color:'#888',marginTop:6,animation:'fadeIn .2s ease'}}>
          {useFx?<span><i className="math">f</i>({nice(probeX)}) = {nice(probeY)}</span>:
           <span>x = {nice(probeX)}, y = {nice(probeY)}</span>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════
//  Interactive Graph (SVG)
// ═══════════════════════════════
function Graph({m,b,n,h,ghostM,ghostB,ghostN,ghostH,showGhost,ghostKey,setGraphKey,onProbe,onProbeEnd}){
  const svgRef=useRef(null);
  const W=600,H=600,pad=40;
  const xRange=[-10,10],yRange=[-10,10];
  const xSpan=xRange[1]-xRange[0],ySpan=yRange[1]-yRange[0];

  const sx=x=>pad+(x-xRange[0])/xSpan*(W-2*pad);
  const sy=y=>H-pad-(y-yRange[0])/ySpan*(H-2*pad);
  const invX=px=>(px-pad)/(W-2*pad)*xSpan+xRange[0];
  const invY=py=>((H-pad-py)/(H-2*pad))*ySpan+yRange[0];

  const f=(x,_m=m,_b=b,_n=n,_h=h)=>{
    const v=x-_h;
    return _m*Math.pow(v,_n)+_b;
  };

  // Generate curve path
  const makePath=(_m,_b,_n,_h)=>{
    const steps=300;
    let d='';
    for(let i=0;i<=steps;i++){
      const x=xRange[0]+(xRange[1]-xRange[0])*(i/steps);
      const y=f(x,_m,_b,_n,_h);
      if(!isFinite(y)||Math.abs(y)>50) continue;
      const px=sx(x),py=sy(y);
      d+=(d?'L':'M')+`${px.toFixed(1)},${py.toFixed(1)}`;
    }
    return d;
  };

  const mainPath=useMemo(()=>makePath(m,b,n,h),[m,b,n,h]);
  const ghostPath=useMemo(()=>showGhost?makePath(ghostM,ghostB,ghostN,ghostH):'',[showGhost,ghostM,ghostB,ghostN,ghostH]);

  // Grid lines
  const gridLines=useMemo(()=>{
    const lines=[];
    for(let x=Math.ceil(xRange[0]);x<=xRange[1];x++){
      lines.push(<line key={`gx${x}`} x1={sx(x)} y1={pad} x2={sx(x)} y2={H-pad}
        stroke={x===0?COLORS.axis:COLORS.grid} strokeWidth={x===0?2:1}/>);
    }
    for(let y=Math.ceil(yRange[0]);y<=yRange[1];y++){
      lines.push(<line key={`gy${y}`} x1={pad} y1={sy(y)} x2={W-pad} y2={sy(y)}
        stroke={y===0?COLORS.axis:COLORS.grid} strokeWidth={y===0?2:1}/>);
    }
    return lines;
  },[]);

  // Tick labels
  const ticks=useMemo(()=>{
    const t=[];
    for(let x=Math.ceil(xRange[0]);x<=xRange[1];x++){
      if(x===0) continue;
      t.push(<text key={`tx${x}`} x={sx(x)} y={sy(0)+16} fill="#3a3c55" fontSize="10"
        textAnchor="middle" fontFamily="JetBrains Mono">{x}</text>);
    }
    for(let y=Math.ceil(yRange[0]);y<=yRange[1];y++){
      if(y===0) continue;
      t.push(<text key={`ty${y}`} x={sx(0)-10} y={sy(y)+4} fill="#3a3c55" fontSize="10"
        textAnchor="end" fontFamily="JetBrains Mono">{y}</text>);
    }
    return t;
  },[]);

  // Special points
  const yInt=f(0); // y-intercept
  const yIntOnScreen=yInt>=-10&&yInt<=10;

  // Vertex/anchor point at (h, b)
  const vertexOnScreen=b>=-10&&b<=10&&h>=-10&&h<=10;

  // Touch/mouse probe
  const handlePointer=(e)=>{
    const svg=svgRef.current;
    if(!svg) return;
    const rect=svg.getBoundingClientRect();
    const scaleX=W/rect.width, scaleY=H/rect.height;
    let cx,cy;
    if(e.touches){
      cx=(e.touches[0].clientX-rect.left)*scaleX;
      cy=(e.touches[0].clientY-rect.top)*scaleY;
    } else {
      cx=(e.clientX-rect.left)*scaleX;
      cy=(e.clientY-rect.top)*scaleY;
    }
    const x=round2(invX(cx));
    const y=round2(f(x));
    onProbe(x,y);
  };

  return (
    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
      style={{width:'100%',height:'auto',borderRadius:16,
        background:'#0a0c14',border:'1px solid #1a1c28',touchAction:'none',cursor:'crosshair'}}
      onTouchStart={e=>{handlePointer(e);e.preventDefault()}}
      onTouchMove={e=>{handlePointer(e);e.preventDefault()}}
      onTouchEnd={()=>onProbeEnd()}
      onMouseDown={handlePointer}
      onMouseMove={e=>{if(e.buttons)handlePointer(e)}}
      onMouseUp={()=>onProbeEnd()}
      onMouseLeave={()=>onProbeEnd()}
    >
      {/* Grid */}
      {gridLines}

      {/* Axis arrows */}
      <polygon points={`${sx(0)},${pad-8} ${sx(0)-5},${pad+2} ${sx(0)+5},${pad+2}`} fill={COLORS.axis}/>
      <polygon points={`${W-pad+8},${sy(0)} ${W-pad-2},${sy(0)-5} ${W-pad-2},${sy(0)+5}`} fill={COLORS.axis}/>
      <text x={W-pad+6} y={sy(0)-8} fill="#555" fontSize="13" fontFamily="STIX Two Text" fontStyle="italic">x</text>
      <text x={sx(0)+8} y={pad-4} fill="#555" fontSize="13" fontFamily="STIX Two Text" fontStyle="italic">y</text>

      {/* Ticks */}
      {ticks}

      {/* Ghost curve (previous state) — visible amber dashed line */}
      {showGhost&&ghostPath&&(
        <path key={ghostKey} d={ghostPath} fill="none" stroke="#e8963c" strokeWidth="2.5"
          strokeDasharray="9,5" strokeLinejoin="round"
          style={{animation:ghostKey>0?'ghostFadeOut 1.5s ease forwards':undefined,opacity:.6}}/>
      )}

      {/* Main curve glow / trail — animates on Set Graph press */}
      <path key={`glow-${setGraphKey}`} d={mainPath} fill="none" stroke={COLORS.curveShadow} strokeWidth="14"
        strokeLinejoin="round" strokeLinecap="round"
        style={{strokeDasharray:2000,animation:'drawLine 0.8s ease forwards'}}/>

      {/* Main curve — animates on Set Graph press */}
      <path key={`main-${setGraphKey}`} d={mainPath} fill="none" stroke={COLORS.curve} strokeWidth="3"
        strokeLinejoin="round" strokeLinecap="round"
        style={{strokeDasharray:2000,animation:'drawLine 0.6s ease forwards'}}/>

      {/* Y-intercept dot */}
      {yIntOnScreen&&(
        <g>
          <circle cx={sx(0)} cy={sy(yInt)} r="7" fill={COLORS.b} opacity=".25"/>
          <circle cx={sx(0)} cy={sy(yInt)} r="4" fill={COLORS.b}/>
          {/* Label */}
          <rect x={sx(0)+10} y={sy(yInt)-10} width="52" height="20" rx="6"
            fill="#0c0e16" fillOpacity=".85" stroke={COLORS.b} strokeWidth="1" strokeOpacity=".3"/>
          <text x={sx(0)+36} y={sy(yInt)+4} fill={COLORS.b}
            fontSize="12" textAnchor="middle" fontFamily="DM Sans" fontWeight="700">
            b = {nice(b)}
          </text>
        </g>
      )}

      {/* Vertex/shift point at (h, b) for non-linear */}
      {vertexOnScreen&&n!==1&&(
        <g>
          <circle cx={sx(h)} cy={sy(b)} r="8" fill={COLORS.h} opacity=".2"/>
          <circle cx={sx(h)} cy={sy(b)} r="5" fill={COLORS.h}/>
        </g>
      )}

      {/* ── Horizontal shift visualization ── */}
      {h!==0&&(()=>{
        // Reference y-level: for linear, use y=b (the y-intercept level)
        // For non-linear, use y=b (the vertex)
        const refY = b;
        const refYScreen = refY>=-8&&refY<=8;
        // The "anchor point" is at (h, f(h)) = (h, m*0^n + b) = (h, b)
        // The "unshifted anchor" would be at (0, b)
        const anchorX = h;
        const anchorY = f(h); // = m*(h-h)^n + b = b (for any n)
        const unshiftedX = 0;
        const unshiftedY = b;
        const showAnchor = Math.abs(anchorY)<=10 && Math.abs(h)<=10;

        if(!showAnchor) return null;

        return <g>
          {/* Horizontal track line at y=b level */}
          <line x1={sx(Math.min(0,h)-0.5)} y1={sy(b)} x2={sx(Math.max(0,h)+0.5)} y2={sy(b)}
            stroke={COLORS.h} strokeWidth="2.5" strokeDasharray="6,4" opacity=".5"/>

          {/* Unshifted anchor (ghost dot at origin) */}
          <circle cx={sx(0)} cy={sy(b)} r="6" fill="none" stroke={COLORS.h} strokeWidth="1.5"
            strokeDasharray="3,2" opacity=".5"/>

          {/* Arrow from unshifted to shifted position */}
          {Math.abs(h)>=0.5&&(
            <g>
              {/* Arrow shaft */}
              <line x1={sx(0)} y1={sy(b)} x2={sx(h)-(h>0?8:-8)} y2={sy(b)}
                stroke={COLORS.h} strokeWidth="3" opacity=".7"/>
              {/* Arrowhead */}
              <polygon
                points={h>0
                  ?`${sx(h)},${sy(b)} ${sx(h)-10},${sy(b)-6} ${sx(h)-10},${sy(b)+6}`
                  :`${sx(h)},${sy(b)} ${sx(h)+10},${sy(b)-6} ${sx(h)+10},${sy(b)+6}`}
                fill={COLORS.h} opacity=".7"/>
            </g>
          )}

          {/* Shifted anchor point (solid) */}
          <circle cx={sx(h)} cy={sy(b)} r="7" fill={COLORS.h} opacity=".35"/>
          <circle cx={sx(h)} cy={sy(b)} r="5" fill={COLORS.h}/>

          {/* Shift distance label */}
          {(()=>{
            const labelX=(sx(0)+sx(h))/2;
            const labelY=sy(b)-(n===1?22:26);
            const txt=`h = ${h>0?'+':''}${nice(h)}`;
            const w=txt.length*8+16;
            return <g>
              <rect x={labelX-w/2} y={labelY-11} width={w} height="22" rx="7"
                fill="#0c0e16" fillOpacity=".9" stroke={COLORS.h} strokeWidth="1.5" strokeOpacity=".4"/>
              <text x={labelX} y={labelY+4} fill={COLORS.h}
                fontSize="13" textAnchor="middle" fontFamily="DM Sans" fontWeight="700">{txt}</text>
            </g>;
          })()}

          {/* For LINEAR: show ghost of unshifted line so movement is visible */}
          {n===1&&(()=>{
            const ghostPath2=makePath(m,b,1,0); // unshifted version
            return <g>
              <path d={ghostPath2} fill="none" stroke={COLORS.h} strokeWidth="1.5" opacity=".12"
                strokeDasharray="8,6" strokeLinejoin="round"/>
              {/* "h=0" label on ghost line */}
              {Math.abs(b)<=7&&(
                <g>
                  <rect x={sx(-3)-20} y={sy(f(-3,m,b,1,0))-22} width="44" height="18" rx="5"
                    fill="#0c0e16" fillOpacity=".8" stroke={COLORS.h} strokeWidth="1" strokeOpacity=".15"/>
                  <text x={sx(-3)+2} y={sy(f(-3,m,b,1,0))-9} fill={COLORS.h}
                    fontSize="10" textAnchor="middle" fontFamily="DM Sans" fontWeight="600" opacity=".35">h = 0</text>
                </g>
              )}
            </g>;
          })()}

          {/* Vertical dashed line down from anchor to x-axis for context */}
          {Math.abs(b)>0.5&&(
            <line x1={sx(h)} y1={sy(b)} x2={sx(h)} y2={sy(0)}
              stroke={COLORS.h} strokeWidth="1" strokeDasharray="3,3" opacity=".2"/>
          )}
          {/* h tick on x-axis */}
          <circle cx={sx(h)} cy={sy(0)} r="3" fill={COLORS.h} opacity=".4"/>
        </g>;
      })()}

      {/* Slope indicator: rise/run triangle at x=h+1 */}
      {n===1&&m!==0&&Math.abs(m)<=8&&(()=>{
        const x0=h, y0=f(h);
        const x1=h+1, y1=f(h+1);
        if(Math.abs(y0)>8||Math.abs(y1)>8) return null;
        const runLabelX=(sx(x0)+sx(x1))/2;
        const runLabelY=sy(y0)+(m>0?20:-14);
        const riseLabelX=sx(x1)+(m>0?14:-50);
        const riseLabelY=(sy(y0)+sy(y1))/2+5;
        return <g>
          {/* Run line */}
          <line x1={sx(x0)} y1={sy(y0)} x2={sx(x1)} y2={sy(y0)}
            stroke={COLORS.m} strokeWidth="3" strokeDasharray="6,3" opacity=".7"/>
          {/* Rise line */}
          <line x1={sx(x1)} y1={sy(y0)} x2={sx(x1)} y2={sy(y1)}
            stroke={COLORS.m} strokeWidth="3" opacity=".7"/>
          {/* Run label with background */}
          <rect x={runLabelX-28} y={runLabelY-13} width="56" height="20" rx="6"
            fill="#0c0e16" fillOpacity=".85" stroke={COLORS.m} strokeWidth="1" strokeOpacity=".3"/>
          <text x={runLabelX} y={runLabelY+2} fill={COLORS.m}
            fontSize="14" textAnchor="middle" fontFamily="DM Sans" fontWeight="700">run: 1</text>
          {/* Rise label with background */}
          <rect x={riseLabelX-6} y={riseLabelY-13} width={`${50+nice(m).length*4}`} height="20" rx="6"
            fill="#0c0e16" fillOpacity=".85" stroke={COLORS.m} strokeWidth="1" strokeOpacity=".3"/>
          <text x={riseLabelX+22} y={riseLabelY+2} fill={COLORS.m}
            fontSize="14" textAnchor="middle" fontFamily="DM Sans" fontWeight="700">rise: {nice(m)}</text>
          {/* Corner dots */}
          <circle cx={sx(x0)} cy={sy(y0)} r="5" fill={COLORS.m} opacity=".6"/>
          <circle cx={sx(x1)} cy={sy(y0)} r="4" fill={COLORS.m} opacity=".4"/>
          <circle cx={sx(x1)} cy={sy(y1)} r="5" fill={COLORS.m} opacity=".6"/>
        </g>;
      })()}
    </svg>
  );
}

// ═══════════════════════════════
//  Parameter Slider
// ═══════════════════════════════
function ParamSlider({label,value,min,max,step,color,onChange,icon,description,id}){
  return (
    <div style={{marginBottom:14}} id={id}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
        <div style={{display:'flex',alignItems:'baseline',gap:8}}>
          <span className="math" style={{fontSize:18,fontWeight:700,color,fontStyle:'italic'}}>{label}</span>
          <span style={{fontSize:11,color:'#3a3c55'}}>{description}</span>
        </div>
        <span className="mono" style={{fontSize:16,fontWeight:600,color,minWidth:50,textAlign:'right'}}>
          {nice(value)}
        </span>
      </div>
      <input type="range" className="param-slider" style={{'--tc':color}}
        min={min} max={max} step={step} value={value}
        onChange={e=>onChange(parseFloat(e.target.value))}/>
    </div>
  );
}

// ═══════════════════════════════
//  Function Machine
// ═══════════════════════════════
function FunctionMachine({m,b,n,h,inputX,useFx}){
  const [localX,setLocalX]=useState(inputX!=null?inputX:2);
  useEffect(()=>{if(inputX!=null)setLocalX(round2(inputX));},[inputX]);

  const x=localX;
  const v=x-h;
  const powered=Math.pow(v,n);
  const scaled=m*powered;
  const result=scaled+b;

  const M='\u2212';
  const stepColor='#555';
  const valColor='#ddd';

  // Build substitution display: f(xVal) = m(xVal-h)^n + b
  const xStr=nice(x);
  const mAbs=Math.abs(m);
  const mSign=m<0?M:'';
  const mShow=(mAbs===1&&n!==0)?'':`${nice(mAbs)}`;

  const innerDisp=(()=>{
    if(n===0) return null;
    if(h===0){
      return x<0&&n>1?`(${xStr})`:`${xStr}`;
    }
    return `(${xStr}\u00a0${h>0?M:'+'}\u00a0${nice(Math.abs(h))})`;
  })();

  const bPart=b===0?null:(
    <span style={{color:COLORS.b}}>{b>0?` + ${nice(b)}`:`\u00a0${M}\u00a0${nice(Math.abs(b))}`}</span>
  );

  const lhsLabel=useFx?<><i>f</i>({xStr})</>:`y`;

  let rhsNodes;
  if(m===0&&n!==0){
    rhsNodes=b===0?<span>0</span>:<span style={{color:COLORS.b}}>{nice(b)}</span>;
  } else if(n===0){
    rhsNodes=<span style={{color:COLORS.b}}>{nice(m+b)}</span>;
  } else {
    rhsNodes=(
      <>
        {mSign&&<span style={{color:COLORS.m}}>{mSign}</span>}
        {mShow&&<span style={{color:COLORS.m}}>{mShow}</span>}
        {innerDisp&&<span style={{color:COLORS.h}}>{innerDisp}</span>}
        {n>1&&<sup style={{fontSize:'.6em',color:COLORS.n,position:'relative',top:'-.4em'}}>{n}</sup>}
        {bPart}
      </>
    );
  }

  return (
    <div className="machine-box" style={{animation:'slideIn .3s ease'}}>
      <div style={{fontSize:10,fontWeight:700,color:'#6eb4e6',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>
        Function Machine
      </div>

      {/* Substitution display at top */}
      <div className="math" style={{
        fontSize:20,fontWeight:700,color:'#eaeaf2',lineHeight:1.5,
        marginBottom:12,padding:'10px 14px',background:'#0c0e16',borderRadius:10,
        border:'1px solid #2a2c40',
      }}>
        <span style={{color:'#888'}}>{lhsLabel}</span>
        <span style={{color:'#3a3c55'}}> = </span>
        {rhsNodes}
        <span style={{color:'#3a3c55'}}> = </span>
        <span style={{color:COLORS.curve}}>{nice(result)}</span>
      </div>

      {/* x input slider */}
      <div style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
          <span style={{fontSize:12,color:'#666'}}>Input value</span>
          <span className="mono" style={{fontSize:15,fontWeight:700,color:COLORS.h}}>x = {xStr}</span>
        </div>
        <input type="range" className="param-slider" style={{'--tc':COLORS.h}}
          min={-10} max={10} step={0.5} value={localX}
          onChange={e=>setLocalX(parseFloat(e.target.value))}/>
      </div>

      {/* Step-by-step */}
      <div style={{display:'flex',alignItems:'center',gap:0,overflowX:'auto',padding:'4px 0'}}>
        {/* Input */}
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:9,color:stepColor,textTransform:'uppercase',fontWeight:600,marginBottom:4}}>Input</div>
          <div className="math" style={{fontSize:22,fontWeight:700,color:COLORS.h}}>
            <i>x</i> = {xStr}
          </div>
        </div>

        <div style={{padding:'0 8px',flexShrink:0,color:'#3a3c55',fontSize:22}}>→</div>

        {/* Shift */}
        {h!==0&&<>
          <div style={{textAlign:'center',flexShrink:0,background:'#0c0e16',borderRadius:10,padding:'8px 12px',border:`1px solid ${COLORS.h}20`}}>
            <div style={{fontSize:9,color:COLORS.h,textTransform:'uppercase',fontWeight:600,marginBottom:3}}>Shift</div>
            <div className="mono" style={{fontSize:13,color:valColor}}>
              {nice(x)} {h>0?M:'+'} {nice(Math.abs(h))} = {nice(v)}
            </div>
          </div>
          <div style={{padding:'0 8px',flexShrink:0,color:'#3a3c55',fontSize:22}}>→</div>
        </>}

        {/* Power */}
        {n!==1&&n!==0&&<>
          <div style={{textAlign:'center',flexShrink:0,background:'#0c0e16',borderRadius:10,padding:'8px 12px',border:`1px solid ${COLORS.n}20`}}>
            <div style={{fontSize:9,color:COLORS.n,textTransform:'uppercase',fontWeight:600,marginBottom:3}}>Power</div>
            <div className="mono" style={{fontSize:13,color:valColor}}>
              {nice(v)}{sup(n)} = {nice(powered)}
            </div>
          </div>
          <div style={{padding:'0 8px',flexShrink:0,color:'#3a3c55',fontSize:22}}>→</div>
        </>}

        {/* Scale */}
        {m!==1&&m!==0&&<>
          <div style={{textAlign:'center',flexShrink:0,background:'#0c0e16',borderRadius:10,padding:'8px 12px',border:`1px solid ${COLORS.m}20`}}>
            <div style={{fontSize:9,color:COLORS.m,textTransform:'uppercase',fontWeight:600,marginBottom:3}}>Scale</div>
            <div className="mono" style={{fontSize:13,color:valColor}}>
              {nice(m)} × {nice(n===1&&h===0?v:n===0?1:powered)} = {nice(scaled)}
            </div>
          </div>
          <div style={{padding:'0 8px',flexShrink:0,color:'#3a3c55',fontSize:22}}>→</div>
        </>}

        {/* Shift up */}
        {b!==0&&<>
          <div style={{textAlign:'center',flexShrink:0,background:'#0c0e16',borderRadius:10,padding:'8px 12px',border:`1px solid ${COLORS.b}20`}}>
            <div style={{fontSize:9,color:COLORS.b,textTransform:'uppercase',fontWeight:600,marginBottom:3}}>Vertical Shift</div>
            <div className="mono" style={{fontSize:13,color:valColor}}>
              {nice(scaled)} {b>0?'+':M} {nice(Math.abs(b))} = {nice(result)}
            </div>
          </div>
          <div style={{padding:'0 8px',flexShrink:0,color:'#3a3c55',fontSize:22}}>→</div>
        </>}

        {/* Output */}
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:9,color:stepColor,textTransform:'uppercase',fontWeight:600,marginBottom:4}}>Output</div>
          <div className="math" style={{fontSize:22,fontWeight:700,color:COLORS.curve}}>
            {nice(result)}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════
//  Insight Cards
// ═══════════════════════════════
function InsightCard({param,m,b,n,h}){
  const insights={
    m:{
      title:'Slope / Stretch',
      color:COLORS.m,
      text: n===1
        ? (m>0?`Positive slope: line rises ${nice(Math.abs(m))} for every 1 unit right`
          :m<0?`Negative slope: line falls ${nice(Math.abs(m))} for every 1 unit right`
          :'Zero slope: horizontal line')
        : (m>0?`Coefficient stretches the curve${Math.abs(m)<1?' (compressed)':Math.abs(m)>1?' (stretched)':''} vertically`
          :m<0?'Negative coefficient flips the curve upside down'
          :'Zero: the curve collapses to a horizontal line'),
    },
    b:{
      title:'Vertical Shift',
      color:COLORS.b,
      text: b===0?'No vertical shift — curve passes through origin (if h=0)'
        :b>0?`Shifts the entire curve UP by ${nice(b)} units`
        :`Shifts the entire curve DOWN by ${nice(Math.abs(b))} units`,
    },
    n:{
      title:'Exponent / Degree',
      color:COLORS.n,
      text: n===1?'Linear: straight line'
        :n===2?'Quadratic: U-shaped parabola (symmetric)'
        :n===3?'Cubic: S-shaped curve (odd symmetry)'
        :n===0?'Constant: flat horizontal line'
        :`Degree ${n} polynomial`,
    },
    h:{
      title:'Horizontal Shift',
      color:COLORS.h,
      text: h===0?'No horizontal shift — anchor point sits at the origin'
        :n===1?(h>0
          ?`Shifts the anchor point RIGHT by ${nice(h)}. For a line, this looks like moving down — watch the green dot and dashed ghost line to see the horizontal movement.`
          :`Shifts the anchor point LEFT by ${nice(Math.abs(h))}. For a line, this looks like moving up — watch the green dot and dashed ghost line to see the horizontal movement.`)
        :h>0?`Shifts the curve RIGHT by ${nice(h)} units — the vertex moves from (0, b) to (${nice(h)}, b)`
        :`Shifts the curve LEFT by ${nice(Math.abs(h))} units — the vertex moves from (0, b) to (${nice(h)}, b)`,
    },
  };
  const info=insights[param];
  if(!info) return null;
  return (
    <div style={{
      background:'#10121c',borderRadius:10,padding:'12px 16px',
      border:`1px solid ${info.color}18`,marginTop:8,animation:'slideIn .3s ease',
    }}>
      <div style={{fontSize:9,fontWeight:700,color:info.color,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:5}}>
        {info.title}
      </div>
      <div style={{fontSize:13,color:'#999',lineHeight:1.5}}>{info.text}</div>
    </div>
  );
}

// ── Question Components ──

function MCQuestion({q,options,correctIdx,onCorrect,explanation,color}){
  const [picked,setPicked]=useState(null);
  const [revealed,setRevealed]=useState(false);
  const isRight=picked===correctIdx;
  return <div>
    <div style={{fontSize:15,color:'#ccc',lineHeight:1.6,marginBottom:14}}>{q}</div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {options.map((o,i)=>{
        const isPicked=picked===i;
        const showCorrect=revealed&&i===correctIdx;
        const showWrong=revealed&&isPicked&&!isRight;
        return <button key={i} onClick={()=>{
          if(revealed) return;
          setPicked(i);setRevealed(true);
          if(i===correctIdx) setTimeout(()=>onCorrect(),800);
        }} style={{
          padding:'12px 16px',borderRadius:10,textAlign:'left',
          background:showCorrect?'#5cc8b015':showWrong?'#e0605015':'#0c0e16',
          border:`2px solid ${showCorrect?'#5cc8b050':showWrong?'#e0605050':'#1e2030'}`,
          color:showCorrect?'#5cc8b0':showWrong?'#e06050':'#aaa',
          fontSize:14,fontFamily:"'STIX Two Text',serif",cursor:revealed?'default':'pointer',
          transition:'all .3s',
        }}>{o}</button>;
      })}
    </div>
    {revealed&&<div style={{marginTop:12,fontSize:13,color:'#777',lineHeight:1.6,
      padding:'10px 14px',background:'#10121c',borderRadius:8,border:'1px solid #1a1c28',
      animation:'slideIn .3s ease'}}>
      {isRight?<span style={{color:'#5cc8b0',fontWeight:600}}>Correct! </span>:
        <span style={{color:'#e06050',fontWeight:600}}>Not quite. </span>}
      {explanation}
    </div>}
  </div>;
}

function InputQuestion({q,answer,tolerance,onCorrect,explanation,placeholder,color,unit}){
  const [val,setVal]=useState('');
  const [checked,setChecked]=useState(false);
  const [isRight,setIsRight]=useState(false);
  const check=()=>{
    const v=parseFloat(val);
    const tol=tolerance||0.1;
    const ok=!isNaN(v)&&Math.abs(v-answer)<=tol;
    setIsRight(ok);setChecked(true);
    if(ok) setTimeout(()=>onCorrect(),800);
  };
  return <div>
    <div style={{fontSize:15,color:'#ccc',lineHeight:1.6,marginBottom:14}}>{q}</div>
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <input value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')check()}}
        placeholder={placeholder||'?'} inputMode="decimal"
        style={{
          width:90,padding:'10px 14px',borderRadius:10,fontSize:18,fontWeight:600,
          background:'#0a0b14',border:`2px solid ${checked?(isRight?'#5cc8b050':'#e0605050'):'#2a2c40'}`,
          color:'#eee',fontFamily:"'STIX Two Text',serif",textAlign:'center',
        }}/>
      {unit&&<span className="math" style={{fontSize:16,color:'#666'}}>{unit}</span>}
      <button onClick={check} style={{
        padding:'10px 20px',borderRadius:10,border:'none',fontSize:13,fontWeight:700,
        background:color?color+'20':'#1e1830',color:color||'#a88cdc',cursor:'pointer',
      }}>Check</button>
    </div>
    {checked&&<div style={{marginTop:10,fontSize:13,color:'#777',lineHeight:1.6,
      padding:'10px 14px',background:'#10121c',borderRadius:8,border:'1px solid #1a1c28',
      animation:'slideIn .3s ease'}}>
      {isRight?<span style={{color:'#5cc8b0',fontWeight:600}}>Correct! </span>:
        <span style={{color:'#e06050',fontWeight:600}}>The answer is {answer}. </span>}
      {explanation}
    </div>}
  </div>;
}

function SetAndObserve({instruction,params,setM,setB,setN,setH,startGhost,endGhost,setActiveParam,onSetGraph,children}){
  const apply=()=>{
    startGhost();
    if(onSetGraph) onSetGraph();
    if(params.m!=null)setM(params.m);
    if(params.b!=null)setB(params.b);
    if(params.n!=null)setN(params.n);
    if(params.h!=null)setH(params.h);
    if(params.focus) setActiveParam(params.focus);
    endGhost();
  };
  return <div>
    <div style={{fontSize:15,color:'#ccc',lineHeight:1.6,marginBottom:12}}>{instruction}</div>
    <button onClick={apply} style={{
      padding:'10px 20px',borderRadius:10,border:'2px solid #f0c86830',
      background:'#f0c86810',color:'#f0c868',fontSize:13,fontWeight:700,
      cursor:'pointer',marginBottom:14,transition:'all .2s',
    }}>Set Graph →</button>
    {children}
  </div>;
}

function EquationBuilder({q,targetM,targetB,targetN,targetH,m,b,n,h,setM,setB,setN,setH,startGhost,endGhost,onCorrect,explanation}){
  const [checked,setChecked]=useState(false);
  const [isRight,setIsRight]=useState(false);
  const check=()=>{
    const ok=Math.abs(m-targetM)<0.1&&Math.abs(b-targetB)<0.1&&n===targetN&&Math.abs(h-targetH)<0.1;
    setIsRight(ok);setChecked(true);
    if(ok) setTimeout(()=>onCorrect(),800);
  };
  return <div>
    <div style={{fontSize:15,color:'#ccc',lineHeight:1.6,marginBottom:12}}>{q}</div>
    <div style={{fontSize:12,color:'#555',marginBottom:14}}>
      Use the sliders above to build your equation — the graph updates in real-time.
    </div>
    <button onClick={check} style={{
      padding:'12px 24px',borderRadius:10,border:'none',fontSize:14,fontWeight:700,
      background:'linear-gradient(135deg,#f0c86825,#6eb4e615)',
      color:'#f0c868',cursor:'pointer',transition:'all .2s',
    }}>Check My Equation</button>
    {checked&&<div style={{marginTop:10,fontSize:13,color:'#777',lineHeight:1.6,
      padding:'10px 14px',background:'#10121c',borderRadius:8,border:'1px solid #1a1c28',
      animation:'slideIn .3s ease'}}>
      {isRight?<span style={{color:'#5cc8b0',fontWeight:600}}>Perfect! </span>:
        <span style={{color:'#e06050',fontWeight:600}}>Not quite — </span>}
      {isRight?explanation:`Target: m=${targetM}, b=${targetB}, n=${targetN}, h=${targetH}. Keep adjusting!`}
    </div>}
  </div>;
}

function VocabIntro({terms,children}){
  return (
    <div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
        {terms.map((t,i)=>(
          <div key={i} style={{
            background:'#0c0e16',borderRadius:10,padding:'12px 16px',
            border:`1px solid ${t.color}25`,
          }}>
            <div style={{fontSize:11,fontWeight:700,color:t.color,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>{t.term}</div>
            <div style={{fontSize:13,color:'#888',lineHeight:1.55}}>{t.definition}</div>
            {t.example&&<div style={{fontSize:12,color:t.color,opacity:.6,marginTop:5,fontStyle:'italic'}}>{t.example}</div>}
          </div>
        ))}
      </div>
      {children}
    </div>
  );
}

  const section=SECTIONS[sectionIdx];
  const question=section?.questions[questionIdx];
  const key=`${sectionIdx}_${questionIdx}`;
  const isDone=completed[key];
  const doneCount=Object.keys(completed).length;

  const advance=()=>{
    setCompleted(prev=>({...prev,[key]:true}));
    setTimeout(()=>{
      if(questionIdx<section.questions.length-1){
        setQuestionIdx(qi=>qi+1);
      } else if(sectionIdx<SECTIONS.length-1){
        setSectionIdx(si=>si+1);
        setQuestionIdx(0);
      }
    },300);
  };

  return (
    <div style={{marginTop:32,borderTop:'1px solid #1a1c28',paddingTop:28}}>

      {/* Progress indicator + reset */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="mono" style={{fontSize:13,color:'#888'}}>{doneCount}/{totalQ}</div>
          <div style={{width:90,height:6,borderRadius:3,background:'#1a1c28',overflow:'hidden'}}>
            <div style={{width:`${pct}%`,height:'100%',borderRadius:3,
              background:'linear-gradient(90deg,#f0c868,#6eb4e6)',transition:'width .5s ease'}}/>
          </div>
          <div className="mono" style={{fontSize:12,color:'#f0c868'}}>{pct}%</div>
        </div>
        <button onClick={onReset} style={{
          padding:'5px 12px',borderRadius:8,border:'1px solid #e0605030',
          background:'#e0605010',color:'#e06050',fontSize:11,fontWeight:600,cursor:'pointer',
        }}>Reset</button>
      </div>

      {/* Current section */}
      {section&&(
        <div style={{animation:'fadeIn .3s ease'}}>
          <div style={{
            background:'#10121c',borderRadius:14,padding:'20px 22px',
            border:`1px solid ${section.color}18`,marginBottom:16,
          }}>
            <div style={{fontSize:10,fontWeight:700,color:section.color,textTransform:'uppercase',
              letterSpacing:'.1em',marginBottom:8}}>{section.title}</div>
            <div style={{fontSize:14,color:'#888',lineHeight:1.6}}>{section.intro}</div>
          </div>

          {/* Question dots */}
          <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
            {section.questions.map((_,qi)=>{
              const qk=`${sectionIdx}_${qi}`;
              const qDone=completed[qk];
              const isCurrent=qi===questionIdx;
              return <button key={qi} onClick={()=>setQuestionIdx(qi)}
                style={{
                  width:32,height:32,borderRadius:8,
                  border:`2px solid ${isCurrent?section.color+'60':qDone?'#5cc8b030':'#1e2030'}`,
                  background:qDone?'#5cc8b010':isCurrent?section.color+'10':'transparent',
                  color:qDone?'#5cc8b0':isCurrent?section.color:'#444',
                  fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .2s',
                }}>{qDone?'✓':qi+1}</button>;
            })}
          </div>

          {/* Question card */}
          {question&&(
            <div key={key} style={{
              background:'#12141e',borderRadius:14,padding:'22px 24px',
              border:`1px solid ${isDone?'#5cc8b020':'#1c1d2a'}`,
              animation:'slideIn .3s ease',
            }}>
              <div style={{fontSize:10,color:'#3a3c55',marginBottom:6}}>
                Question {questionIdx+1} of {section.questions.length}
              </div>

              {/* SET + MC */}
              {(question.type==='set_mc'||question.type==='set_input')&&(
                <SetAndObserve
                  instruction={question.instruction}
                  params={question.params}
                  setM={setM} setB={setB} setN={setN} setH={setH}
                  startGhost={startGhost} endGhost={endGhost} setActiveParam={setActiveParam}
                  onSetGraph={onSetGraph}
                >
                  {question.mc||question.options&&!question.answer?(
                    <MCQuestion q={question.q} options={question.options}
                      correctIdx={question.correctIdx} explanation={question.explanation}
                      onCorrect={advance} color={section.color}/>
                  ):(
                    <InputQuestion q={question.q} answer={question.answer}
                      tolerance={question.tolerance} explanation={question.explanation}
                      onCorrect={advance} placeholder={question.placeholder}
                      color={section.color}/>
                  )}
                </SetAndObserve>
              )}

              {/* BUILD */}
              {question.type==='build'&&(
                <EquationBuilder q={question.q}
                  targetM={question.targetM} targetB={question.targetB}
                  targetN={question.targetN} targetH={question.targetH}
                  m={m} b={b} n={n} h={h}
                  setM={setM} setB={setB} setN={setN} setH={setH}
                  startGhost={startGhost} endGhost={endGhost}
                  onCorrect={advance} explanation={question.explanation}/>
              )}

              {/* VOCAB + MC */}
              {question.type==='vocab_mc'&&(
                <VocabIntro terms={question.vocabTerms}>
                  <MCQuestion q={question.q} options={question.options}
                    correctIdx={question.correctIdx} explanation={question.explanation}
                    onCorrect={advance} color={section.color}/>
                </VocabIntro>
              )}

              {isDone&&<div style={{marginTop:12,display:'flex',alignItems:'center',gap:6,color:'#5cc8b0',fontWeight:600,fontSize:13}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5cc8b0" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                Completed
              </div>}
            </div>
          )}

          {/* Section nav — below the question box */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:16}}>
            {SECTIONS.map((s,i)=>{
              const sDone=s.questions.every((_,qi)=>completed[`${i}_${qi}`]);
              return <button key={i} onClick={()=>{setSectionIdx(i);setQuestionIdx(0)}}
                style={{
                  padding:'7px 14px',borderRadius:8,fontSize:11,fontWeight:600,
                  border:`1.5px solid ${sectionIdx===i?s.color+'50':'#1e2030'}`,
                  background:sectionIdx===i?s.color+'12':'transparent',
                  color:sectionIdx===i?s.color:sDone?'#5cc8b0':'#555',
                  cursor:'pointer',transition:'all .2s',
                }}>
                {sDone?'✓ ':''}{s.title}
              </button>;
            })}
          </div>

          {/* Navigation */}
          <div style={{display:'flex',gap:8,marginTop:14,justifyContent:'space-between'}}>
            <button onClick={()=>{
              if(questionIdx>0) setQuestionIdx(qi=>qi-1);
              else if(sectionIdx>0){setSectionIdx(si=>si-1);setQuestionIdx(SECTIONS[sectionIdx-1].questions.length-1);}
            }} style={{
              padding:'10px 18px',borderRadius:8,border:'1px solid #1e2030',
              background:'transparent',color:'#555',fontSize:12,fontWeight:600,cursor:'pointer',
            }}>← Previous</button>
            <button onClick={()=>{
              if(questionIdx<section.questions.length-1) setQuestionIdx(qi=>qi+1);
              else if(sectionIdx<SECTIONS.length-1){setSectionIdx(si=>si+1);setQuestionIdx(0);}
            }} style={{
              padding:'10px 18px',borderRadius:8,border:`1px solid ${section.color}30`,
              background:section.color+'10',color:section.color,fontSize:12,fontWeight:600,cursor:'pointer',
            }}>Next →</button>
          </div>
        </div>
      )}

      {/* Completion */}
      {pct===100&&(
        <div style={{
          marginTop:24,background:'linear-gradient(135deg,#5cc8b010,#f0c86810)',
          borderRadius:14,padding:'24px',border:'1px solid #5cc8b020',
          textAlign:'center',animation:'slideIn .5s ease',
        }}>
          <div style={{fontSize:28}}>🎉</div>
          <div style={{fontSize:18,fontWeight:700,color:'#eee',marginTop:8}}>Worksheet Complete!</div>
          <div style={{fontSize:14,color:'#888',marginTop:6}}>
            You've mastered slope, intercepts, exponents, shifts, and function notation. Keep experimenting in the sandbox!
          </div>
        </div>
      )}
    </div>
  );
}

const TUTORIAL_STEPS=[
  {
    type:'modal',icon:'👋',
    title:'Welcome to Graph Sandbox!',
    body:"This quick interactive tour will have you actually move the controls. Each step only advances when you interact — much better than just reading!",
  },
  {
    type:'interact',targetId:'tut-m',trigger:'slider_m',
    title:'Slope (m) — drag this slider',
    body:'Move it left or right. The line gets steeper or flatter. Watch the equation below the graph update as you drag!',
    hint:'↔  Drag the m slider now',
  },
  {
    type:'interact',targetId:'tut-b',trigger:'slider_b',
    title:'Y-intercept (b) — drag this slider',
    body:'Drag b to slide the whole line up or down. Notice the blue dot on the y-axis — that is the y-intercept moving.',
    hint:'↔  Drag the b slider now',
  },
  {
    type:'interact',targetId:'tut-h',trigger:'slider_h',
    title:'Horizontal shift (h) — drag this slider',
    body:'Drag h to shift the anchor point left or right. A green arrow appears on the graph showing the direction and size of the shift.',
    hint:'↔  Drag the h slider now',
  },
  {
    type:'interact',targetId:'tut-graph',trigger:'graph_touch',
    title:'Trace the graph',
    body:'Touch or click anywhere on the graph. The coordinates of that point on the curve will appear below the equation.',
    hint:'👆  Touch or click the graph',
  },
  {
    type:'interact',targetId:'tut-presets',trigger:'preset_click',
    title:'Parent function presets',
    body:'Tap any of these buttons to jump straight to y = x, y = x², or y = x³ and explore each parent function.',
    hint:'👆  Tap a preset button',
  },
  {
    type:'modal',icon:'🎉',
    title:"You're all set!",
    body:"Explore freely. When you're ready, scroll down to work through the guided worksheet questions — they walk you through each concept using the live graph.",
  },
];

function Tutorial({step:s,stepIdx,onAdvance,onClose}){
  const [rect,setRect]=useState(null);
  const isModal=s.type==='modal';

  useEffect(()=>{
    if(isModal||!s.targetId){setRect(null);return;}
    const update=()=>{
      const el=document.getElementById(s.targetId);
      if(!el) return;
      const r=el.getBoundingClientRect();
      setRect({top:r.top,left:r.left,width:r.width,height:r.height});
    };
    // Scroll element into view on step change
    const el=document.getElementById(s.targetId);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
    const t=setTimeout(update,120);
    window.addEventListener('resize',update,{passive:true});
    window.addEventListener('scroll',update,{passive:true});
    const col=document.querySelector('.controls-col');
    if(col) col.addEventListener('scroll',update,{passive:true});
    const iv=setInterval(update,250);
    return ()=>{clearTimeout(t);clearInterval(iv);
      window.removeEventListener('resize',update);
      window.removeEventListener('scroll',update);
      if(col) col.removeEventListener('scroll',update);
    };
  },[s.targetId,isModal]);

  if(isModal){
    return (
      <div style={{
        position:'fixed',inset:0,background:'rgba(0,0,0,.82)',
        zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',
        padding:20,backdropFilter:'blur(4px)',
      }}>
        <div style={{
          background:'#12141e',borderRadius:20,padding:'30px 28px',
          maxWidth:400,width:'100%',border:'1px solid #2a2c40',
          animation:'slideIn .3s ease',
        }}>
          <div style={{fontSize:42,textAlign:'center',marginBottom:12}}>{s.icon}</div>
          <h2 style={{fontSize:21,fontWeight:700,color:'#eaeaf2',textAlign:'center',marginBottom:10,lineHeight:1.3}}>{s.title}</h2>
          <p style={{fontSize:14,color:'#999',lineHeight:1.75,marginBottom:24,textAlign:'center'}}>{s.body}</p>
          <div style={{display:'flex',gap:10}}>
            <button onClick={onClose} style={{
              flex:1,padding:'12px',borderRadius:10,border:'1px solid #2a2c40',
              background:'transparent',color:'#555',fontSize:13,fontWeight:600,cursor:'pointer',
            }}>Skip Tour</button>
            <button onClick={onAdvance} style={{
              flex:2,padding:'12px',borderRadius:10,border:'none',
              background:'linear-gradient(135deg,#f0c868,#6eb4e6)',
              color:'#0c0e16',fontSize:14,fontWeight:700,cursor:'pointer',
            }}>Let's Go! →</button>
          </div>
        </div>
      </div>
    );
  }

  // Interact step — spotlight overlay
  if(!rect) return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,pointerEvents:'none'}}/>
  );

  const PAD=10;
  const sTop=rect.top-PAD, sLeft=rect.left-PAD;
  const sW=rect.width+PAD*2, sH=rect.height+PAD*2;
  const TW=250, vW=window.innerWidth, vH=window.innerHeight;
  const onRight=sLeft+sW/2 > vW/2;
  const tLeft=onRight ? Math.max(8,sLeft-TW-14) : Math.min(vW-TW-8,sLeft+sW+14);
  const tTop=Math.max(8,Math.min(sTop+sH/2-90, vH-240));

  // Step counter dots
  const dots=TUTORIAL_STEPS.map((_,i)=>(
    <div key={i} style={{
      width:6,height:6,borderRadius:'50%',
      background:i===stepIdx?'#f0c868':i<stepIdx?'#5cc8b0':'#2a2c40',
      transition:'background .3s',
    }}/>
  ));

  return (
    <>
      {/* Full-screen click-through backdrop — pointer-events none so user can interact */}
      <div style={{position:'fixed',inset:0,zIndex:2000,pointerEvents:'none'}}/>

      {/* Spotlight: box-shadow creates the dark surround with a bright cutout */}
      <div style={{
        position:'fixed',
        top:sTop,left:sLeft,width:sW,height:sH,
        borderRadius:14,zIndex:2001,
        pointerEvents:'none',
        animation:'tutPulse 2s ease-in-out infinite',
      }}/>

      {/* Tooltip card — has pointer-events so buttons work */}
      <div style={{
        position:'fixed',top:tTop,left:tLeft,width:TW,
        background:'#12141e',borderRadius:14,padding:'16px 16px 14px',
        border:'1px solid #f0c86855',zIndex:2002,
        boxShadow:'0 10px 40px rgba(0,0,0,.6)',
        animation:'slideIn .25s ease',
      }}>
        {/* Progress dots */}
        <div style={{display:'flex',gap:5,marginBottom:10,justifyContent:'center'}}>{dots}</div>
        <div style={{fontSize:13,fontWeight:700,color:'#f0c868',marginBottom:6,lineHeight:1.3}}>{s.title}</div>
        <div style={{fontSize:12,color:'#aaa',lineHeight:1.65,marginBottom:11}}>{s.body}</div>
        <div style={{
          fontSize:12,fontWeight:700,color:'#f0c868',letterSpacing:'.02em',
          padding:'7px 10px',background:'#f0c86815',borderRadius:8,
          textAlign:'center',marginBottom:10,animation:'pulse 1.5s infinite',
        }}>{s.hint}</div>
        <button onClick={onAdvance} style={{
          width:'100%',padding:'7px',borderRadius:8,
          border:'1px solid #2a2c40',background:'transparent',
          color:'#555',fontSize:11,fontWeight:600,cursor:'pointer',
        }}>Skip this step →</button>
      </div>
    </>
  );
}

//  Main App
// ═══════════════════════════════
function App(){
  const [m,setM]=useState(1);
  const [b,setB]=useState(0);
  const [n,setN]=useState(1);
  const [h,setH]=useState(0);
  const [wsSection,setWsSection]=useState(0);
  const [wsQuestion,setWsQuestion]=useState(0);
  const [wsCompleted,setWsCompleted]=useState({});
  const resetWorksheet=()=>{setWsSection(0);setWsQuestion(0);setWsCompleted({});};
  const totalQ=SECTIONS.reduce((a,s)=>a+s.questions.length,0);
  const wsScore=Object.keys(wsCompleted).length;
  const wsPct=Math.round(wsScore/totalQ*100);
  const [useFx,setUseFx]=useState(false);
  const [showMachine,setShowMachine]=useState(false);
  const [activeParam,setActiveParam]=useState('m');
  const [probeX,setProbeX]=useState(null);
  const [probeY,setProbeY]=useState(null);
  const [showProbe,setShowProbe]=useState(false);

  // Ghost curve (shows previous state when dragging)
  const [ghost,setGhost]=useState({m:1,b:0,n:1,h:0});
  const [showGhost,setShowGhost]=useState(false);
  const [ghostKey,setGhostKey]=useState(0);
  const [setGraphKey,setSetGraphKey]=useState(0);
  const [isLandscape,setIsLandscape]=useState(false);
  const ghostTimer=useRef(null);
  const [showTutorial,setShowTutorial]=useState(true);
  const [tutStep,setTutStep]=useState(0);
  const tutBlockRef=useRef(false);
  const advanceTutorial=useCallback(()=>{
    if(tutBlockRef.current) return;
    tutBlockRef.current=true;
    setTutStep(cur=>{
      const next=cur+1;
      if(next>=TUTORIAL_STEPS.length){
        setTimeout(()=>{setShowTutorial(false);tutBlockRef.current=false;},450);
        return cur;
      }
      setTimeout(()=>{tutBlockRef.current=false;},650);
      return next;
    });
  },[]);

  useEffect(()=>{
    const mq=window.matchMedia('(min-aspect-ratio:1/1) and (min-width:640px)');
    const update=()=>setIsLandscape(mq.matches);
    update();
    mq.addEventListener('change',update);
    return ()=>mq.removeEventListener('change',update);
  },[]);

  const startGhost=()=>{
    setGhost({m,b,n,h});
    setShowGhost(true);
    if(ghostTimer.current) clearTimeout(ghostTimer.current);
  };
  const endGhost=()=>{
    if(ghostTimer.current) clearTimeout(ghostTimer.current);
    ghostTimer.current=setTimeout(()=>setShowGhost(false),1600);
  };
  const handleSetGraph=()=>{
    setSetGraphKey(k=>k+1);
    setGhostKey(k=>k+1);
  };

  const handleProbe=(x,y)=>{
    setProbeX(x);setProbeY(y);setShowProbe(true);
    if(showTutorial&&TUTORIAL_STEPS[tutStep]?.trigger==='graph_touch') advanceTutorial();
  };
  const handleProbeEnd=()=>{setShowProbe(false)};

  // Presets
  const presets=[
    {label:'y = 0',m:0,b:0,n:1,h:0},
    {label:'y = x',m:1,b:0,n:1,h:0},
    {label:'y = x²',m:1,b:0,n:2,h:0},
    {label:'y = x³',m:1,b:0,n:3,h:0},
  ];

  const applyPreset=(p)=>{
    startGhost();
    setM(p.m);setB(p.b);setN(p.n);setH(p.h);
    endGhost();
    if(showTutorial&&TUTORIAL_STEPS[tutStep]?.trigger==='preset_click') advanceTutorial();
  };

  return (
    <div className="safe-top safe-bottom" style={{minHeight:'100vh'}}>
      {showTutorial&&<Tutorial
        step={TUTORIAL_STEPS[tutStep]}
        stepIdx={tutStep}
        onAdvance={advanceTutorial}
        onClose={()=>setShowTutorial(false)}/>}
      <div style={{position:'fixed',inset:0,opacity:.01,pointerEvents:'none',
        backgroundImage:'radial-gradient(circle at 30% 20%,#6eb4e6 1px,transparent 1px)',
        backgroundSize:'60px 60px'}}/>

      {/* Header */}
      <header className="compact-header" style={{padding:'18px 22px 10px',borderBottom:'1px solid #181a24',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div>
          <h1 className="math" style={{fontWeight:700,fontSize:23,
            background:'linear-gradient(135deg,#f0c868 20%,#6eb4e6 80%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            Graph Sandbox
          </h1>
          <p style={{fontSize:10,color:'#3a3c50',marginTop:1}}>Explore how each parameter shapes the curve</p>
        </div>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <button className={`toggle-chip${!useFx?' active':''}`} style={{'--tc':'#888'}}
            onClick={()=>setUseFx(false)}>y =</button>
          <button className={`toggle-chip${useFx?' active':''}`} style={{'--tc':'#6eb4e6'}}
            onClick={()=>setUseFx(true)}><i className="math">f</i>(x) =</button>
          <button onClick={()=>{setTutStep(0);tutBlockRef.current=false;setShowTutorial(true);}} style={{
            padding:'6px 10px',borderRadius:8,border:'1px solid #2a2c40',
            background:'#12141e',color:'#555',fontSize:12,fontWeight:700,cursor:'pointer',
            marginLeft:4,
          }} title="Help / Tutorial">?</button>
        </div>
      </header>

      <main style={{maxWidth:1100,margin:'0 auto',padding:'16px 18px 40px'}}>
        <div className="app-layout">

        {/* ── LEFT: Graph column ── */}
        <div className="graph-col">
          {/* Graph */}
          <div id="tut-graph" style={{borderRadius:16,overflow:'hidden'}}>
          <Graph m={m} b={b} n={n} h={h}
            ghostM={ghost.m} ghostB={ghost.b} ghostN={ghost.n} ghostH={ghost.h}
            showGhost={showGhost} ghostKey={ghostKey} setGraphKey={setGraphKey}
            onProbe={handleProbe} onProbeEnd={handleProbeEnd}/>
          </div>

          {/* Equation display — below the graph, 1.5× larger */}
          <EquationDisplay m={m} b={b} n={n} h={h} useFx={useFx}
            probeX={probeX} probeY={probeY} showProbe={showProbe}/>

          {/* Probe hint */}
          <div style={{textAlign:'center',padding:'2px 0 6px',fontSize:10,color:'#2a2c40'}}>
            Touch and drag on the graph to trace the curve
          </div>
        </div>

        {/* ── RIGHT: Controls column ── */}
        <div className="controls-col">

        {/* Exponent selector */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 0 4px'}}>
          <span className="math" style={{fontSize:16,fontWeight:700,color:COLORS.n,fontStyle:'italic'}}>n</span>
          <span style={{fontSize:11,color:'#3a3c55'}}>exponent</span>
          <div style={{display:'flex',gap:5,marginLeft:'auto'}}>
            {[0,1,2,3].map(v=>(
              <button key={v} className={`toggle-chip${n===v?' active':''}`}
                style={{'--tc':COLORS.n}}
                onClick={()=>{startGhost();setN(v);setActiveParam('n');endGhost()}}>
                {v===0?'constant':v===1?'linear':v===2?'quadratic':'cubic'}
              </button>
            ))}
          </div>
        </div>

        {/* Sliders */}
        <div style={{background:'#10121c',borderRadius:14,padding:'18px 20px',border:'1px solid #1a1c28',marginTop:8}}>
          <ParamSlider id="tut-m" label="m" description={n===1?"slope":"coefficient"} color={COLORS.m}
            value={m} min={-5} max={5} step={0.25}
            onChange={v=>{startGhost();setM(v);setActiveParam('m');endGhost();
              if(showTutorial&&TUTORIAL_STEPS[tutStep]?.trigger==='slider_m') advanceTutorial();}}/>
          <ParamSlider id="tut-b" label="b" description="y-intercept / vertical shift" color={COLORS.b}
            value={b} min={-6} max={6} step={0.5}
            onChange={v=>{startGhost();setB(v);setActiveParam('b');endGhost();
              if(showTutorial&&TUTORIAL_STEPS[tutStep]?.trigger==='slider_b') advanceTutorial();}}/>
          <ParamSlider id="tut-h" label="h" description="horizontal shift" color={COLORS.h}
            value={h} min={-5} max={5} step={0.5}
            onChange={v=>{startGhost();setH(v);setActiveParam('h');endGhost();
              if(showTutorial&&TUTORIAL_STEPS[tutStep]?.trigger==='slider_h') advanceTutorial();}}/>
        </div>

        {/* Presets — quick parent functions */}
        <div id="tut-presets" style={{marginTop:10}}>
          <div style={{fontSize:9,fontWeight:700,color:'#3a3c55',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>
            Quick Presets
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {presets.map((p,i)=>(
              <button key={i} className="toggle-chip" style={{'--tc':COLORS.curve}}
                onClick={()=>applyPreset(p)}>
                <span className="math" style={{fontSize:12}}>{p.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Insight card */}
        <InsightCard param={activeParam} m={m} b={b} n={n} h={h}/>

        {/* Worksheet — shown here in landscape so it's adjacent to the graph */}
        {isLandscape&&(
          <Worksheet m={m} b={b} n={n} h={h} setM={setM} setB={setB} setN={setN} setH={setH}
            startGhost={startGhost} endGhost={endGhost} setActiveParam={setActiveParam}
            onSetGraph={handleSetGraph}
            sectionIdx={wsSection} setSectionIdx={setWsSection}
            questionIdx={wsQuestion} setQuestionIdx={setWsQuestion}
            completed={wsCompleted} setCompleted={setWsCompleted}
            totalQ={totalQ} score={wsScore} pct={wsPct} onReset={resetWorksheet}/>
        )}

        {/* Function Machine toggle */}
        <div style={{marginTop:14}}>
          <button className={`toggle-chip${showMachine?' active':''}`}
            style={{'--tc':'#6eb4e6',fontSize:13,padding:'10px 18px',width:'100%'}}
            onClick={()=>setShowMachine(!showMachine)}>
            {showMachine?'Hide':'Show'} Function Machine
          </button>
        </div>
        {showMachine&&(
          <div style={{marginTop:10}}>
            <FunctionMachine m={m} b={b} n={n} h={h}
              inputX={showProbe&&probeX!=null?probeX:2}
              useFx={useFx}/>
          </div>
        )}

        {/* Notation explanation */}
        <div style={{
          marginTop:14,background:'#10121c',borderRadius:12,padding:'16px 20px',
          border:'1px solid #1a1c28',
        }}>
          <div style={{fontSize:9,fontWeight:700,color:'#6eb4e6',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>
            {useFx?'Function Notation':'Equation Notation'}
          </div>
          {useFx?(
            <div style={{fontSize:13,color:'#888',lineHeight:1.7}}>
              <span className="math" style={{color:'#bbb'}}><i>f</i>(<i>x</i>)</span> means "<i>f</i> is a function of <i>x</i>."
              You put <span className="math" style={{color:COLORS.h}}><i>x</i></span> in and get <span className="math" style={{color:COLORS.curve}}><i>f</i>(<i>x</i>)</span> out.
              The graph shows every possible input-output pair. Try the Function Machine above to see each step!
            </div>
          ):(
            <div style={{fontSize:13,color:'#888',lineHeight:1.7}}>
              <span className="math" style={{color:'#bbb'}}>y = mx + b</span> is slope-intercept form.
              <span style={{color:COLORS.m}}> m</span> controls steepness,
              <span style={{color:COLORS.b}}> b</span> is where it crosses the y-axis.
              Switch to <i className="math">f</i>(<i>x</i>) to see it as a function machine.
            </div>
          )}
        </div>

        </div>{/* end controls-col */}
        </div>{/* end app-layout */}

        {/* ═══════════════════════════════════════
             GUIDED WORKSHEET (portrait only — landscape renders inside controls column)
            ═══════════════════════════════════════ */}
        {!isLandscape&&(
          <Worksheet m={m} b={b} n={n} h={h} setM={setM} setB={setB} setN={setN} setH={setH}
            startGhost={startGhost} endGhost={endGhost} setActiveParam={setActiveParam}
            onSetGraph={handleSetGraph}
            sectionIdx={wsSection} setSectionIdx={setWsSection}
            questionIdx={wsQuestion} setQuestionIdx={setWsQuestion}
            completed={wsCompleted} setCompleted={setWsCompleted}
            totalQ={totalQ} score={wsScore} pct={wsPct} onReset={resetWorksheet}/>
        )}

      </main>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Trigger proactive CDN caching once SW is ready
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage('precache-cdn');
      }
      navigator.serviceWorker.ready.then(r => {
        if (r.active) r.active.postMessage('precache-cdn');
      });
    }).catch(() => {});
  });
}
</script>
</body>
</html>
